spring:
  application:
    name: itjobhub

  # ===== DATABASE (MySQL) =====
  datasource:
    url: jdbc:mysql://localhost:3306/itjobhub_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: update   # dev: update | production: validate hoac none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # ===== File upload (CV, avatar, logo) =====
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ===== Mail Sending (SMTP) =====
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000

# ===== Server =====
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}       # 24h (milliseconds)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}   # 7 ngay

# ===== AI - OpenAI / HuggingFace =====
ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  huggingface:
    api-key: ${HUGGINGFACE_API_KEY:}
    base-url: ${HUGGINGFACE_BASE_URL:https://api-inference.huggingface.co}

# ===== Swagger / OpenAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

# ===== Logging =====
logging:
  level:
    root: INFO
    com.itjobhub: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:}

# ===== Mail From Name =====
mail:
  from-name: ${MAIL_FROM_NAME:ITJobHub}